<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WFH Tracker Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      padding: 20px;
      background: #f9fafb;
      color: #111827;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3b82f6;
    }

    .logo h1 {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      letter-spacing: 0.03em;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 11px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      flex-shrink: 0;
    }

    .status-dot.inactive {
      background: #f59e0b;
    }

    .status-text {
      color: #6b7280;
    }

    .status-name {
      font-weight: 700;
      color: #111827;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
    }

    button {
      margin-top: 10px;
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #2563eb; }

    .success {
      display: none;
      margin-top: 10px;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #065f46;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 14px 0;
    }

    .info {
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="logo">
    <div class="logo-dot"></div>
    <h1>WFH Browser Tracker</h1>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="status-dot inactive" id="status-dot"></div>
    <span class="status-text" id="status-text">Not configured</span>
  </div>

  <label for="emp-name">Employee ID</label>
  <input type="text" id="emp-name" placeholder="e.g. EMP-001" autocomplete="off" />

  <button id="save-btn">Save & Activate</button>

  <div class="success" id="success-msg">✓ Saved! Tracking is now active.</div>

  <hr class="divider" />
  <p class="info">Your name is stored locally in this browser.<br/>Tab activity is logged to the WFH dashboard.</p>

  <script src="popup.js"></script>
</body>
</html>
